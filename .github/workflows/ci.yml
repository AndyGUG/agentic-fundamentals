name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── BACKEND ──────────────────────────────────────────────────────────────
  backend-unit:
    name: Backend – Unit & Slice Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit and slice tests
        run: mvn test --no-transfer-progress
        working-directory: backend

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

  backend-integration:
    name: Backend – Integration Tests (Testcontainers)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        run: mvn verify -DskipTests=false --no-transfer-progress
        working-directory: backend

  # ─── FRONTEND ─────────────────────────────────────────────────────────────
  frontend-unit:
    name: Frontend – Unit & Component Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Run unit tests with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  frontend-lint:
    name: Frontend – ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: frontend

  # ─── E2E ──────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend-unit]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: task_manager_db
          POSTGRES_USER: taskuser
          POSTGRES_PASSWORD: taskpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Start backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/task_manager_db
          DB_USERNAME: taskuser
          DB_PASSWORD: taskpass
          CORS_ALLOWED_ORIGINS: http://localhost:3000
        run: |
          mvn spring-boot:run --no-transfer-progress &
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -s http://localhost:8080/api/tasks; do sleep 2; done'
        working-directory: backend

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
